name: Deployment
on:
  push:
    tags:
      - "v*"
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: bun install
        working-directory: frontend

      - name: Build frontend
        run: bun run build
        working-directory: frontend

      - uses: actions/setup-python@v6
        with:
          python-version-file: backend/pyproject.toml

      - name: Install FastAPI Cloud CLI
        run: pip install fastapi-cloud

      - name: Debug PATH
        run: |
          echo "PATH: $PATH"
          which fastapi-cloud || echo "not found in PATH"
          pip show fastapi-cloud
          pip install fastapi-cloud --target /tmp/test 2>&1 | head -5
          find /opt/hostedtoolcache/Python -name "fastapi-cloud" 2>/dev/null
          ls /opt/hostedtoolcache/Python/3.14.3/x64/bin/ | grep fast || echo "not in bin"

      - name: Deploy
        run: fastapi-cloud deploy --token ${{ secrets.FASTAPI_CLOUD_TOKEN }}
        working-directory: backend
