<svg width="320" height="320" viewBox="28 28 264 264" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Strumok emblem">
  <defs>
     <linearGradient id="bg" x1="40" y1="20" x2="300" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16213E"/>
      <stop offset="0.52" stop-color="#1F4FA3"/>
      <stop offset="1" stop-color="#66A3FF"/>
    </linearGradient>

    <linearGradient id="ring" x1="60" y1="60" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.3" stop-color="#c0e6ff"/>
      <stop offset="1" stop-color="#3f89e3"/>
    </linearGradient>

    <linearGradient id="bolt" x1="140" y1="90" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="0.7" stop-color="#fff09c"/>
      <stop offset="1" stop-color="#FFD700"/>
    </linearGradient>

    <linearGradient id="pin" x1="120" y1="100" x2="220" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16a927"/>
      <stop offset="1" stop-color="#00a87b"/>
    </linearGradient>

    <!-- Circular frame that is slightly larger than the outer ring -->
    <clipPath id="circleFrame">
      <circle cx="160" cy="160" r="114"/>
    </clipPath>
  </defs>

  <g clip-path="url(#circleFrame)" transform="translate(160 160) scale(1.1) translate(-160 -160)">
    <!-- Filled circular background replacing the old rounded rect -->
    <circle cx="160" cy="160" r="114" fill="url(#bg)"/>

    <!-- Outer community ring -->
    <circle cx="160" cy="160" r="96" stroke="url(#ring)" stroke-width="10" opacity="0.9"/>

    <!-- Location pin shape -->
    <path d="M160 95
             C120 95 110 130 110 150
             C110 185 160 235 160 235
             C160 235 210 185 210 150
             C210 130 200 95 160 95Z"
          fill="url(#pin)" opacity="0.9"/>

    <!-- Lightning bolt inside -->
    <path d="M170 115L145 160H170L150 205"
          stroke="url(#bolt)" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
